<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}" class="{{ if eq (index .Site.Params "defaultTheme" | default "system") "dark" }}dark{{ end }}" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <!-- RSS -->
  {{ range .AlternativeOutputFormats }}
    <link rel="{{ .Rel }}" type="{{ .MediaType.Type }}" href="{{ .Permalink }}" title="{{ $.Site.Title }}">
  {{ end }}

  <!-- CSS customizado -->
  {{ $css := resources.Get "css/custom.css" }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}">

  <!-- Tema: evitar flash -->
  <script>
    (function() {
      var stored = localStorage.getItem('mitz-theme');
      var theme = stored || 'system';
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var isDark = theme === 'dark' || (theme === 'system' && prefersDark);
      if (isDark) document.documentElement.classList.add('dark');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>

{{ partial "header.html" . }}

<main>
  {{ block "main" . }}{{ end }}
</main>

{{ partial "footer.html" . }}

<!-- JS principal -->
<script>
// ── Tema ──
var themeBtn = document.getElementById('theme-btn');
var themeDropdown = document.getElementById('theme-dropdown');
var currentTheme = localStorage.getItem('mitz-theme') || 'system';

function applyTheme(t) {
  var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  var isDark = t === 'dark' || (t === 'system' && prefersDark);
  document.documentElement.classList.toggle('dark', isDark);
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('mitz-theme', t);
  currentTheme = t;
  updateThemeUI();
}

function updateThemeUI() {
  document.querySelectorAll('.theme-option').forEach(function(el) {
    el.classList.toggle('active', el.dataset.theme === currentTheme);
  });
  var icons = {
    light: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>',
    dark: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',
    system: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>'
  };
  var btn = document.getElementById('theme-btn');
  if (btn) btn.innerHTML = icons[currentTheme] || icons.system;
}

if (themeBtn) {
  themeBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    themeDropdown.classList.toggle('open');
  });
}

document.querySelectorAll('.theme-option').forEach(function(el) {
  el.addEventListener('click', function() {
    applyTheme(this.dataset.theme);
    themeDropdown.classList.remove('open');
  });
});

// ── Idioma ──
var langBtn = document.getElementById('lang-btn');
var langDropdown = document.getElementById('lang-dropdown');

if (langBtn) {
  langBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    langDropdown.classList.toggle('open');
  });
}

// ── Fechar dropdowns clicando fora ──
document.addEventListener('click', function() {
  if (themeDropdown) themeDropdown.classList.remove('open');
  if (langDropdown) langDropdown.classList.remove('open');
});

// Inicializar UI
updateThemeUI();

// Ouvir mudança no sistema
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
  if (currentTheme === 'system') applyTheme('system');
});
</script>

</body>
</html>
